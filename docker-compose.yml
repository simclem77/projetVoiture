version: '3.8'

services:
  # Frontend React (interface utilisateur)
  frontend:
    build: .
    container_name: comparateur-frontend
    ports:
      - "8080:80"  # Port différent de Pi-hole
    restart: unless-stopped
    networks:
      - comparateur-net
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://backend:3000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - nginx-logs:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.3'

  # Backend API + SQLite
  backend:
    build: ./backend
    container_name: comparateur-backend
    ports:
      - "3000:3000"  # API accessible depuis l'extérieur si besoin
    restart: unless-stopped
    networks:
      - comparateur-net
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/comparateur.db
    volumes:
      - comparateur-data:/data
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.4'

networks:
  comparateur-net:
    driver: bridge

volumes:
  nginx-logs:
    driver: local
  backend-logs:
    driver: local
  comparateur-data:
    driver: local
    driver_opts:
      type: none
      device: /home/pi/comparateur-data
      o: bind
